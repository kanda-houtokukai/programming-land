<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>つくるスタジオ ブロック試作</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Zen Maru Gothic", "Hiragino Maru Gothic ProN", sans-serif;
    background: #2e2237;
    display: flex; flex-direction: column;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    background: #241a2c;
    color: #f5eddf;
  }
  header .mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: #f2b23a;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 2px 0 rgba(255,255,255,.45), 0 2px 0 rgba(0,0,0,.35);
  }
  header h1 { font-size: 15px; font-weight: 900; letter-spacing: .06em; }
  header .sub { font-size: 11px; opacity: .65; font-weight: 500; }
  header button {
    margin-left: auto;
    font-family: inherit; font-weight: 700; font-size: 12px;
    color: #f5eddf; background: #4a3a58;
    border: none; border-radius: 999px; padding: 7px 16px;
    box-shadow: inset 0 1.5px 0 rgba(255,255,255,.18), 0 2px 0 rgba(0,0,0,.3);
    cursor: pointer;
  }
  header button:active { transform: translateY(1px); box-shadow: inset 0 1.5px 0 rgba(255,255,255,.18); }
  #wrap { flex: 1; display: flex; min-height: 0; }

  #palette {
    width: 152px; flex-shrink: 0;
    background: linear-gradient(180deg, #8a5a33, #6f4526);
    border-right: 4px solid #543317;
    padding: 10px 10px;
    display: flex; flex-direction: column; gap: 7px;
    position: relative; z-index: 5;
    transition: background .15s;
    touch-action: none;
  }
  #palette .shelf-title {
    color: #f7e6c8; font-size: 12px; font-weight: 900; text-align: center;
    letter-spacing: .12em; margin-bottom: 2px;
    text-shadow: 0 1px 0 rgba(0,0,0,.4);
  }
  #palette.del { background: linear-gradient(180deg, #a03a35, #7c2723); border-right-color: #5c1512; }
  #palette.del .pal { opacity: .25; }
  #palette .delmsg {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    color: #ffe9e2; font-weight: 900; font-size: 14px; text-align: center; line-height: 1.6;
    pointer-events: none;
  }
  #palette.del .delmsg { display: flex; }
  .pal {
    background: rgba(255, 244, 220, .12);
    border: 2px solid rgba(255, 244, 220, .18);
    border-radius: 12px;
    padding: 7px 6px 5px;
    cursor: grab;
    touch-action: none;
    transition: transform .12s, opacity .15s;
  }
  .pal:active { transform: scale(.96); }
  .pal.off { opacity: .35; }
  @keyframes palNo { 0%,100% { transform: none; } 25% { transform: translateX(4px); } 60% { transform: translateX(-4px); } }
  .pal.no { animation: palNo .25s; }
  .pal svg { display: block; margin: 0 auto; }
  .pal .pname {
    text-align: center; color: #f7e6c8; font-size: 10px; font-weight: 700; margin-top: 2px;
  }

  #stage {
    flex: 1; position: relative; overflow: hidden;
    background:
      radial-gradient(circle at 50% -10%, rgba(255, 224, 150, .25), transparent 55%),
      repeating-linear-gradient(0deg, transparent 0 34px, rgba(120, 90, 60, .05) 34px 35px),
      repeating-linear-gradient(90deg, transparent 0 34px, rgba(120, 90, 60, .05) 34px 35px),
      #fdf6e8;
    touch-action: none;
  }
  #stage::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 10px;
    background: linear-gradient(180deg, rgba(84, 51, 23, .0), rgba(84, 51, 23, .25));
    pointer-events: none;
  }
  #hint {
    position: absolute; left: 14px; bottom: 14px; right: 14px;
    color: #8a6b4a; font-size: 11px; font-weight: 700; line-height: 1.7;
    pointer-events: none;
  }

  .blk {
    position: absolute; left: 0; top: 0;
    transition: transform .18s cubic-bezier(.25, .9, .35, 1.25);
    touch-action: none;
    cursor: grab;
    filter: drop-shadow(0 1.5px 0 rgba(90, 60, 20, .28));
  }
  .blk.noanim { transition: none; }
  .blk svg { display: block; overflow: visible; }
  .blk .lbl {
    position: absolute; display: flex; align-items: center; gap: 7px;
    color: #fff; font-weight: 900; font-size: 14px;
    text-shadow: 0 1.5px 0 rgba(0,0,0,.28);
    pointer-events: none; white-space: nowrap;
  }
  .pill {
    pointer-events: auto;
    background: rgba(255,255,255,.94);
    border-radius: 999px;
    padding: 1px 11px;
    font-size: 14px; font-weight: 900;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,.14);
    cursor: pointer;
    min-width: 32px; text-align: center;
  }
  .pill:active { transform: scale(.94); }

  #fly {
    position: absolute; left: 0; top: 0; z-index: 60;
    pointer-events: none;
    transform-origin: 24px 20px;
  }
  #fly.lift { animation: lift .14s ease-out forwards; }
  @keyframes lift {
    to { rotate: 2.6deg; scale: 1.05; }
  }
  #fly .blk { transition: none; filter: drop-shadow(0 7px 9px rgba(60, 30, 10, .32)); }

  @keyframes land {
    0% { scale: 1 1; }
    40% { scale: 1.04 .88; }
    70% { scale: .98 1.05; }
    100% { scale: 1 1; }
  }
  .blk.land { animation: land .2s ease-out; transform-origin: 30px 100%; }

  .ghost {
    position: absolute; z-index: 1;
    border-radius: 10px;
    background: rgba(255, 200, 60, .28);
    outline: 2.5px dashed rgba(214, 148, 20, .75);
    outline-offset: -2px;
    transition: transform .18s cubic-bezier(.25,.9,.35,1.25);
    pointer-events: none;
  }

  @keyframes poof {
    to { scale: .2; opacity: 0; rotate: 14deg; }
  }
  .poof { animation: poof .22s ease-in forwards; }

  #right {
    width: clamp(280px, 36vw, 620px); flex-shrink: 0;
    display: flex; flex-direction: column; gap: 8px;
    padding: 10px;
  }
  #theater {
    height: auto; aspect-ratio: 3 / 2; flex-shrink: 0; position: relative;
    border-radius: 14px; border: 4px solid #241a2c;
    background:
      radial-gradient(circle at 80% 22%, #fff0b8 0 14px, rgba(255, 240, 184, .5) 15px 20px, transparent 21px),
      linear-gradient(180deg, #93d4f2 0%, #cdeefb 46%, #a9dc7c 52%, #7cc45e 78%, #63a94a 100%);
    overflow: hidden;
  }
  .rcap { color: rgba(245, 237, 223, .55); font-size: 11px; font-weight: 700; line-height: 1.6; }
  body.big #palette, body.big #stage { display: none; }
  body.big #right { flex: 1; width: auto; }
  body.big #theater { flex: 1; height: auto; }
  #theater::before, #theater::after {
    content: ""; position: absolute; top: 0; bottom: 0; width: 14px;
    background: repeating-linear-gradient(90deg, #8e3040 0 6px, #6e2130 6px 12px);
    box-shadow: 0 0 12px rgba(0,0,0,.5);
  }
  #theater::before { left: 0; border-radius: 0 8px 8px 0; }
  #theater::after { right: 0; border-radius: 8px 0 0 8px; }
  #theater .tlabel {
    position: absolute; left: 22px; top: 6px;
    color: rgba(30, 70, 40, .55); font-size: 10px; font-weight: 700;
  }
  #bigbtn {
    position: absolute; right: 62px; top: 22px;
    width: 42px; height: 42px; border-radius: 50%;
    border: none; cursor: pointer;
    background: #4a7fc9;
    box-shadow: inset 0 3px 0 rgba(255,255,255,.35), inset 0 -4px 0 rgba(0,0,0,.25), 0 3px 0 rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: center;
  }
  #bigbtn:active { transform: translateY(2px); }
  #actor {
    position: absolute; bottom: 12px; left: 0;
    transition: transform .34s cubic-bezier(.45, .05, .55, 1);
    will-change: transform;
  }
  #actorIn { transform-origin: 50% 100%; }
  @keyframes hop {
    0% { transform: translateY(0); }
    40% { transform: translateY(var(--hopH, -46px)) scaleY(1.06); }
    72% { transform: translateY(0) scaleY(.88) scaleX(1.09); }
    100% { transform: none; }
  }
  #actorIn.hopA { animation: hop .8s cubic-bezier(.35, 0, .35, 1); }
  @keyframes stepSq {
    0%, 100% { transform: none; }
    50% { transform: scaleY(.93) translateY(1.5px); }
  }
  #actorIn.stepA { animation: stepSq .34s ease-out; }
  @keyframes bumpK {
    0%, 100% { transform: none; }
    30% { transform: translateX(6px) rotate(2deg); }
    60% { transform: translateX(-5px); }
  }
  #actorIn.bumpA { animation: bumpK .3s ease-out; }
  #runbtn {
    position: absolute; right: 14px; top: 22px;
    width: 42px; height: 42px; border-radius: 50%;
    border: none; cursor: pointer;
    background: #58a839;
    box-shadow: inset 0 3px 0 rgba(255,255,255,.35), inset 0 -4px 0 rgba(0,0,0,.25), 0 3px 0 rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: center;
  }
  #runbtn:active { transform: translateY(2px); }
  #runbtn.stop { background: #d8553a; }
  .blk.exec svg { filter: drop-shadow(0 0 6px #ffd85e) drop-shadow(0 0 2px #ffb51e) brightness(1.12); }
  body.running #palette { filter: brightness(.55); }
  body.running .blk { cursor: default; }

  #pop {
    position: absolute; z-index: 90; display: none;
    background: #fffdf6;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(60, 30, 10, .3), inset 0 2px 0 #fff;
    padding: 8px 10px;
    display: none; align-items: center; gap: 10px;
  }
  #pop.on { display: flex; }
  #pop button {
    width: 46px; height: 46px; border-radius: 50%;
    border: none; font-size: 26px; font-weight: 900; font-family: inherit;
    color: #fff; cursor: pointer;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,.2), 0 2px 0 rgba(0,0,0,.15);
  }
  #pop button:active { transform: translateY(2px); box-shadow: inset 0 -1px 0 rgba(0,0,0,.2); }
  #pop .minus { background: #e0704f; }
  #pop .plus { background: #58a839; }
  #pop .val { font-size: 26px; font-weight: 900; color: #4a3520; min-width: 40px; text-align: center; }
  #pop::after {
    content: ""; position: absolute; left: 50%; bottom: -8px;
    width: 16px; height: 16px; background: #fffdf6;
    transform: translateX(-50%) rotate(45deg);
    border-radius: 3px;
  }
</style>
</head>
<body>
<header>
  <div class="mark">
    <svg width="17" height="17" viewBox="0 0 17 17"><path d="M2 15V2h9l-2.6 3.4L11 9H4.2" fill="none" stroke="#4a2c05" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/></svg>
  </div>
  <div>
    <h1>つくるスタジオ ブロック試作</h1>
    <div class="sub">プロトタイプ v11 - 生成アイコン(白チップ台座)・余白ゼロ規約に統一</div>
  </div>
  <button id="reset">さいしょから</button>
</header>
<div id="wrap">
  <div id="palette">
    <div class="shelf-title">こうぐだな</div>
    <div class="delmsg">ここで はなすと<br>けせるよ</div>
  </div>
  <div id="stage">
    <div id="hint">
      確認: 生成アイコンが白チップの上に載り、カード色に埋もれず読めるか / 台座のサイズ感 / 操作感は今までどおり
    </div>
    <div id="pop"><button class="minus">−</button><div class="val">3</div><button class="plus">＋</button></div>
    <div id="fly"></div>
  </div>
  <div id="right">
<div id="theater">
  <div class="tlabel">ステージ 12×8(背景は本番で選択式)</div>
  <div id="actor"><div id="actorIn">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <ellipse cx="28" cy="53" rx="15" ry="3" fill="rgba(0,0,0,.3)"/>
      <path d="M14 10 l-4 -8 8 3 z" fill="#2e9c81"/>
      <path d="M42 10 l4 -8 -8 3 z" fill="#2e9c81"/>
      <path d="M28 5 c13 0 21 9 21 21 0 13 -9 21 -21 21 S7 39 7 26 15 5 28 5 Z" fill="#46C2A5" stroke="#2b8a72" stroke-width="2"/>
      <ellipse cx="28" cy="35" rx="10.5" ry="8.5" fill="#c6f2e3"/>
      <circle cx="21" cy="22" r="4.6" fill="#fff"/><circle cx="35" cy="22" r="4.6" fill="#fff"/>
      <circle cx="22" cy="23" r="2.2" fill="#233"/><circle cx="34" cy="23" r="2.2" fill="#233"/>
      <path d="M24 30 q4 3 8 0" fill="none" stroke="#2b8a72" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="20" cy="51" rx="5" ry="3" fill="#2e9c81"/><ellipse cx="36" cy="51" rx="5" ry="3" fill="#2e9c81"/>
    </svg>
  </div></div>
  <button id="bigbtn" aria-label="おおきくする"><svg width="20" height="20" viewBox="0 0 20 20"><path d="M3 8 V3 h5 M17 8 V3 h-5 M3 12 v5 h5 M17 12 v5 h-5" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  <button id="runbtn" aria-label="うごかす"><svg width="20" height="20" viewBox="0 0 20 20"><path d="M5 2 L18 10 L5 18 Z" fill="#fff"/></svg></button>
</div>
  <div class="rcap">さくひん ぜんたい(12×8マス)を いつも表示。ひろげても見える範囲は同じ</div>
  </div>
</div>
<script>
"use strict";
/* ============ ジオメトリ定数(実装移植用の正本) ============ */
const G = {
  R: 9,        // 角丸
  TX: 20,      // 凸凹の開始x
  TW: 30,      // 凸凹の幅
  TD: 8,       // 凸凹の深さ
  SL: 6,       // 凸凹の斜面幅
  H: 48,       // 通常ブロック高さ
  HATH: 56,    // きっかけブロック高さ
  TB: 44,      // 容器の上バー高さ
  BB: 22,      // 容器の下バー高さ
  AW: 17,      // 容器の腕幅
  MOUTH: 46,   // 空の口の高さ
  SNAP: 78,    // 磁石が効く距離(px)
  SNAPWY: 1.3, // 縦方向は少し厳しく(横ずれに寛容・段違い誤爆を防ぐ)
  RESCUE: 140, // 枠外に落としたとき近くの接続先へ救済する距離(px)
  MAXDEPTH: 2, // 入れ子の深さ上限
  CHIP: 34,    // アイコン台座(白チップ)の一辺
  CHIPX: 6,    // チップのx位置
  ICON: 26,    // アイコンの表示サイズ(余白ゼロ規約のため小さめ)
  LABELX: 46   // ラベル開始x(チップ分だけ右へ)
};
const ANIM = {
  shift: "180ms cubic-bezier(.25,.9,.35,1.25)", // 隙間が開く/閉じる
  suck: 110,   // スナップ吸着(ms)
  liftRot: 2.6, liftScale: 1.05,                // 掴んだときの傾き/拡大
  land: 200    // 着地のぷにっ(ms)
};

/* ============ ブロック定義 ============ */
const DEFS = {
  hat:     { w: 218, fill: "#F2A227", dark: "#8F5606", edge: "#C77E0C", label: "はたが おされたら", cat: "きっかけ" },
  move:    { w: 206, fill: "#3E93E8", dark: "#124E8C", edge: "#1F6DBE", label: "みぎへ すすむ", pill: "n", min: 1, max: 10, cat: "うごき" },
  moveL:   { w: 206, fill: "#3E93E8", dark: "#124E8C", edge: "#1F6DBE", label: "ひだりへ すすむ", pill: "n", min: 1, max: 10, cat: "うごき" },
  moveU:   { w: 186, fill: "#3E93E8", dark: "#124E8C", edge: "#1F6DBE", label: "うえへ", pill: "n", min: 1, max: 10, cat: "うごき" },
  moveD:   { w: 186, fill: "#3E93E8", dark: "#124E8C", edge: "#1F6DBE", label: "したへ", pill: "n", min: 1, max: 10, cat: "うごき" },
  jump:    { w: 178, fill: "#3E93E8", dark: "#124E8C", edge: "#1F6DBE", label: "ジャンプ", pill: "n", min: 1, max: 5, cat: "うごき" },
  sound:   { w: 198, fill: "#7BB03B", dark: "#365812", edge: "#578B22", label: "おとを ならす", pill: "s", cat: "おと" },
  repeat:  { w: 206, fill: "#8F7EEA", dark: "#41309B", edge: "#6A57C9", label: "くりかえし", pill: "n", min: 2, max: 10, cat: "せいぎょ" },
  forever: { w: 186, fill: "#8F7EEA", dark: "#41309B", edge: "#6A57C9", label: "ずっと", cat: "せいぎょ" }
};
const SOUNDS = ["ポン", "キラン", "ドン"];

let nextId = 1;
const mk = (type, extra = {}) => Object.assign({ id: nextId++, type }, extra);
const isC = b => b.type === "repeat" || b.type === "forever";

/* ============ パス生成(凸凹が必ずかみ合う共通ジオメトリ) ============ */
function segTabR(x) { // 左→右方向の凸/凹(下向き)
  return `H${x} l${G.SL} ${G.TD} h${G.TW - G.SL * 2} l${G.SL} ${-G.TD}`;
}
function segTabL(x) { // 右→左方向
  return `H${x + G.TW} l${-G.SL} ${G.TD} h${-(G.TW - G.SL * 2)} l${-G.SL} ${-G.TD}`;
}
function pathBody(w) {
  return `M0 ${G.R} Q0 0 ${G.R} 0 ${segTabR(G.TX)} H${w - G.R} Q${w} 0 ${w} ${G.R}`
    + ` V${G.H - G.R} Q${w} ${G.H} ${w - G.R} ${G.H} ${segTabL(G.TX)} H${G.R} Q0 ${G.H} 0 ${G.H - G.R} Z`;
}
function pathHat(w) {
  const h = G.HATH;
  return `M0 24 C0 7 ${w * 0.16} -2 ${w * 0.5} -2 C${w * 0.84} -2 ${w} 7 ${w} 24`
    + ` V${h - G.R} Q${w} ${h} ${w - G.R} ${h} ${segTabL(G.TX)} H${G.R} Q0 ${h} 0 ${h - G.R} Z`;
}
function pathC(w, mouth, flatBottom) {
  const MF = G.TB + mouth;           // 口の床
  const BT = MF + G.BB;              // ブロック下端
  const inX = G.AW;                  // 口の内側x
  let d = `M0 ${G.R} Q0 0 ${G.R} 0 ${segTabR(G.TX)} H${w - G.R} Q${w} 0 ${w} ${G.R}`
    + ` V${G.TB - G.R} Q${w} ${G.TB} ${w - G.R} ${G.TB} ${segTabL(inX + G.TX)} H${inX + G.R} Q${inX} ${G.TB} ${inX} ${G.TB + G.R}`
    + ` V${MF - G.R} Q${inX} ${MF} ${inX + G.R} ${MF} ${segTabR(inX + G.TX)} H${w - G.R} Q${w} ${MF} ${w} ${MF + G.R}`
    + ` V${BT - G.R} Q${w} ${BT} ${w - G.R} ${BT}`;
  if (flatBottom) d += ` H${G.R} Q0 ${BT} 0 ${BT - G.R} Z`;
  else d += ` ${segTabL(G.TX)} H${G.R} Q0 ${BT} 0 ${BT - G.R} Z`;
  return d;
}
function gloss(w, isHat) {
  if (isHat) return `M${w * 0.2} 8 C${w * 0.33} 3.5 ${w * 0.67} 3.5 ${w * 0.8} 8`;
  return `M${G.TX + G.TW + 8} 5 H${w - 14}`;

/* ============ 状態 ============ */
let stacks = [];
function initialScene() {
  nextId = 1;
  stacks = [
    { x: 70, y: 40, blocks: [
      mk("hat"),
      mk("move", { n: 3 }),
      mk("repeat", { n: 2, children: [ mk("moveU", { n: 2 }), mk("jump", { n: 1 }), mk("moveD", { n: 2 }), mk("sound", { s: 0 }) ] })
    ]},
    { x: 400, y: 86, blocks: [ mk("forever", { children: [] }) ] }
  ];
}

/* ============ 計測 ============ */
function blockH(b) {
  if (b.type === "hat") return G.HATH;
  if (isC(b)) {
    const m = b.children.length ? stackH(b.children) : G.MOUTH;
    return G.TB + m + G.BB;
  }
  return G.H;
}
function stackH(list) { return list.reduce((a, b) => a + blockH(b), 0); }
function containerDepth(list) {
  let d = 0;
  for (const b of list) if (isC(b)) d = Math.max(d, 1 + containerDepth(b.children));
  return d;
}

/* ============ レイアウト ============ */
let nodes = [], slots = [];
function layList(list, x, y, depth) {
  let cy = y;
  list.forEach((b, i) => {
    const allowSlot = depth > 0 || i > 0;
    const afterForever = i > 0 && list[i - 1].type === "forever";
    if (allowSlot && !afterForever) slots.push({ list, index: i, x, y: cy, depth, len: list.length });
    if (gapAt(list, i)) cy += drag.groupH;
    const node = { b, x, y: cy, depth };
    nodes.push(node);
    if (isC(b)) {
      const inner = layList(b.children, x + G.AW, cy + G.TB, depth + 1);
      node.mouth = Math.max(inner, G.MOUTH);
      node.h = G.TB + node.mouth + G.BB;
    } else node.h = blockH(b);
    cy += node.h;
  });
  const endForever = list.length && list[list.length - 1].type === "forever";
  if ((depth > 0 || list.length > 0) && !endForever)
    slots.push({ list, index: list.length, x, y: cy, depth, len: list.length });
  if (gapAt(list, list.length)) cy += drag.groupH;
  return cy - y;
}
function gapAt(list, i) {
  return drag && drag.slot && drag.slot.list === list && drag.slot.index === i;
}
function layoutAll() {
  nodes = []; slots = [];
  for (const st of stacks) layList(st.blocks, st.x, st.y, 0);
}

/* ============ DOM描画 ============ */
const stage = document.getElementById("stage");
const fly = document.getElementById("fly");
const palette = document.getElementById("palette");
const els = new Map();  // id -> div
let ghostEl = null;

function makeShape(b, mouth) {
  const d = DEFS[b.type];
  let path, hh;
  if (b.type === "hat") { path = pathHat(d.w); hh = G.HATH; }
  else if (isC(b)) { path = pathC(d.w, mouth, b.type === "forever"); hh = G.TB + mouth + G.BB; }
  else { path = pathBody(d.w); hh = G.H; }
  // チップ(白い台座)は本体の上端側に置く。容器は上バー、帽子は丸い頭の下に収める
  const chipY = b.type === "hat" ? 14 : (isC(b) ? (G.TB - G.CHIP) / 2 : (G.H - G.CHIP) / 2);
  const iconOff = (G.CHIP - G.ICON) / 2;
  return `<svg width="${d.w + 2}" height="${hh + G.TD + 4}" viewBox="-1 ${b.type === "hat" ? -4 : -1} ${d.w + 2} ${hh + G.TD + (b.type === "hat" ? 9 : 6)}">
    <path d="${path}" fill="${d.fill}" stroke="${d.edge}" stroke-width="2"/>
    <path d="${gloss(d.w, b.type === "hat")}" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="3.5" stroke-linecap="round"/>
    <rect x="${G.CHIPX}" y="${chipY}" width="${G.CHIP}" height="${G.CHIP}" rx="11"
          fill="#FFFDF6" stroke="rgba(0,0,0,.10)" stroke-width="1"/>
    <image href="${ICON_IMG[b.type]}" x="${G.CHIPX + iconOff}" y="${chipY + iconOff}"
           width="${G.ICON}" height="${G.ICON}"/>
  </svg>`;
}
function labelHTML(b) {
  const d = DEFS[b.type];
  const ps = `style="color:${d.dark}; text-shadow:none;"`;
  let inner = d.label;
  if (d.pill === "n") inner += ` <span class="pill" ${ps} data-pill="${b.id}">×${b.n}</span>`;
  if (d.pill === "s") inner += ` <span class="pill" ${ps} data-pill="${b.id}">${SOUNDS[b.s]}</span>`;
  return inner;
}
function createEl(b, mouth) {
  const div = document.createElement("div");
  div.className = "blk noanim";
  div.dataset.id = b.id;
  div.innerHTML = makeShape(b, mouth) + `<div class="lbl" style="left:${G.LABELX}px; top:${b.type === "hat" ? 26 : (isC(b) ? 12 : 13)}px;">${labelHTML(b)}</div>`;
  div._mouth = mouth;
  return div;
}
function render() {
  layoutAll();
  const seen = new Set();
  nodes.forEach((n, order) => {
    let div = els.get(n.b.id);
    const mouth = n.mouth || 0;
    if (!div) {
      div = createEl(n.b, mouth);
      els.set(n.b.id, div);
      stage.appendChild(div);
      div.style.transform = `translate(${n.x}px, ${n.y}px)`;
      requestAnimationFrame(() => div.classList.remove("noanim"));
    } else if (isC(n.b) && div._mouth !== mouth) {
      div.innerHTML = makeShape(n.b, mouth) + `<div class="lbl" style="left:${G.LABELX}px; top:12px;">${labelHTML(n.b)}</div>`;
      div._mouth = mouth;
    }
    div.style.transform = `translate(${n.x}px, ${n.y}px)`;
    div.style.zIndex = 10 + order;
    seen.add(n.b.id);
  });
  for (const [id, div] of els) if (!seen.has(id)) { div.remove(); els.delete(id); }
  if (palEls.hat) palEls.hat.classList.toggle("off", hasHat());
  // スナップ先ゴースト
  if (drag && drag.slot) {
    if (!ghostEl) { ghostEl = document.createElement("div"); ghostEl.className = "ghost"; stage.appendChild(ghostEl); }
    const s = drag.slot;
    let gy = s.y;
    ghostEl.style.width = (DEFS[drag.group[0].type].w) + "px";
    ghostEl.style.height = (drag.groupH - 4) + "px";
    ghostEl.style.transform = `translate(${s.x}px, ${gy}px)`;
    ghostEl.style.display = "block";
  } else if (ghostEl) ghostEl.style.display = "none";
}

/* ============ サウンド ============ */
let AC = null;
function ac() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); return AC; }
function tone(freq, dur, type, vol, slide) {
  try {
    const c = ac(), o = c.createOscillator(), g = c.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, c.currentTime + dur);
    g.gain.value = vol || 0.18;
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + dur);
  } catch (e) {}
}
const sndSnap = () => { tone(1500, 0.045, "square", 0.1); tone(600, 0.07, "sine", 0.14); };
const sndPick = () => tone(900, 0.05, "sine", 0.08);
const sndPoof = () => tone(320, 0.16, "sine", 0.16, 90);
const sndTick = () => tone(1100, 0.04, "square", 0.07);
const SND = [
  () => tone(440, 0.16, "sine", 0.2),
  () => { tone(880, 0.09, "sine", 0.16); setTimeout(() => tone(1320, 0.14, "sine", 0.16), 70); },
  () => tone(120, 0.22, "sine", 0.28)
];

/* ============ ドラッグ ============ */
let drag = null;
function stagePos(e) {
  const r = stage.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function findBlock(list, id, path) {
  for (let i = 0; i < list.length; i++) {
    const b = list[i];
    if (b.id === id) return { list, index: i };
    if (isC(b)) { const f = findBlock(b.children, id, path); if (f) return f; }
  }
  return null;
}
function renderFly(group) {
  fly.innerHTML = "";
  let cy = 0;
  const walk = (list, x, y) => {
    let yy = y;
    for (const b of list) {
      const mouth = isC(b) ? (b.children.length ? stackH(b.children) : G.MOUTH) : 0;
      const div = createEl(b, mouth);
      div.classList.add("noanim");
      div.style.transform = `translate(${x}px, ${yy}px)`;
      fly.appendChild(div);
      if (isC(b)) walk(b.children, x + G.AW, yy + G.TB);
      yy += blockH(b);
    }
  };
  walk(group, 0, 0);
}
function eligibleSlot(px, py, range) {
  const head = drag.group[0].type;
  if (head === "hat") return null;
  const gDepth = containerDepth(drag.group);
  const tailForever = drag.group[drag.group.length - 1].type === "forever";
  let best = null, bestD = range || G.SNAP;
  for (const s of slots) {
    if (s.depth + gDepth > G.MAXDEPTH) continue;
    if ((head === "forever" || tailForever) && s.index !== s.len) continue;
    const dx = px - s.x, dy = (py - s.y) * G.SNAPWY; // 横ずれに寛容な楕円判定
    const dist = Math.hypot(dx, dy);
    if (dist < bestD) { bestD = dist; best = s; }
  }
  return best;
}
// 落下地点が既存ブロックに重なっているか(救済スナップの発動条件)
function overlapsAnyBlock(fx, fy, group) {
  const gw = DEFS[group[0].type].w, gh = stackH(group);
  for (const n of nodes) {
    const nw = DEFS[n.b.type].w, nh = n.h || blockH(n.b);
    if (fx < n.x + nw && fx + gw > n.x && fy < n.y + nh && fy + gh > n.y) return true;
  }
  return false;
}
function beginDrag(e, group, fromPalette, grabOffset) {
  drag = {
    group, fromPalette,
    ox: grabOffset.x, oy: grabOffset.y,
    slot: null,
    groupH: stackH(group)
  };
  renderFly(group);
  const p = stagePos(e);
  fly.style.transform = `translate(${p.x - drag.ox}px, ${p.y - drag.oy}px)`;
  fly.classList.remove("lift");
  void fly.offsetWidth;
  fly.classList.add("lift");
  fly.style.display = "block";
  sndPick();
  render();
}
function moveDrag(e) {
  if (!drag) return;
  const p = stagePos(e);
  const fx = p.x - drag.ox, fy = p.y - drag.oy;
  fly.style.transform = `translate(${fx}px, ${fy}px)`;
  // たな(削除)判定
  const pr = palette.getBoundingClientRect();
  const overPal = e.clientX < pr.right && !drag.fromPalette;
  palette.classList.toggle("del", overPal);
  const prevSlot = drag.slot;
  drag.slot = overPal ? null : eligibleSlot(fx, fy);
  if (drag.slot !== prevSlot) { render(); if (drag.slot) sndTick(); }
}
function endDrag(e) {
  if (!drag) return;
  const d = drag;
  const p = stagePos(e);
  palette.classList.remove("del");
  const pr = palette.getBoundingClientRect();
  const overPal = e.clientX < pr.right && !d.fromPalette;

  if (overPal) {
    fly.classList.add("poof");
    sndPoof();
    setTimeout(() => { fly.classList.remove("poof"); fly.style.display = "none"; drag = null; render(); }, 220);
    drag = { slot: null, group: d.group, groupH: 0 };
    render();
    drag = null;
    return;
  }
  if (d.slot) {
    // 磁石: 吸着アニメ → 挿入
    const s = d.slot;
    fly.classList.remove("lift");
    fly.style.transition = `transform ${ANIM.suck}ms ease-out, rotate ${ANIM.suck}ms, scale ${ANIM.suck}ms`;
    fly.style.transform = `translate(${s.x}px, ${s.y}px)`;
    const group = d.group;
    setTimeout(() => {
      fly.style.transition = "";
      fly.style.display = "none";
      s.list.splice(s.index, 0, ...group);
      drag = null;
      render();
      sndSnap();
      const headEl = els.get(group[0].id);
      if (headEl) { headEl.classList.add("land"); setTimeout(() => headEl.classList.remove("land"), ANIM.land + 40); }
    }, ANIM.suck);
    drag.committing = true;
    return;
  }
  // 感知圏外だがブロックに重なって落ちた → 近くの接続先へ救済スナップ
  const fx = p.x - d.ox, fy = p.y - d.oy;
  if (overlapsAnyBlock(fx, fy, d.group)) {
    const rescue = eligibleSlot(fx, fy, G.RESCUE);
    if (rescue) {
      d.slot = rescue;
      fly.classList.remove("lift");
      fly.style.transition = `transform ${ANIM.suck}ms ease-out, rotate ${ANIM.suck}ms, scale ${ANIM.suck}ms`;
      fly.style.transform = `translate(${rescue.x}px, ${rescue.y}px)`;
      const group = d.group;
      setTimeout(() => {
        fly.style.transition = "";
        fly.style.display = "none";
        rescue.list.splice(rescue.index, 0, ...group);
        drag = null;
        render();
        sndSnap();
        const headEl = els.get(group[0].id);
        if (headEl) { headEl.classList.add("land"); setTimeout(() => headEl.classList.remove("land"), ANIM.land + 40); }
      }, ANIM.suck);
      drag.committing = true;
      return;
    }
  }
  // どこでもない → 新しいスタックとして置く
  const nx = Math.max(6, p.x - d.ox), ny = Math.max(6, p.y - d.oy);
  stacks.push({ x: nx, y: ny, blocks: d.group });
  fly.style.display = "none";
  drag = null;
  render();
  const headEl = els.get(stacks[stacks.length - 1].blocks[0].id);
  if (headEl) { headEl.classList.add("land"); setTimeout(() => headEl.classList.remove("land"), ANIM.land + 40); }
}

/* ============ ポインタ配線 ============ */
let pending = null; // {e0, blockId | palType, grabOffset}
stage.addEventListener("pointerdown", e => {
  hidePop();
  if (running) return;
  const pill = e.target.closest(".pill");
  if (pill) { e.stopPropagation(); onPill(pill); return; }
  const blkEl = e.target.closest(".blk");
  if (!blkEl || blkEl.parentElement === fly) return;
  const id = +blkEl.dataset.id;
  const p = stagePos(e);
  const m = /translate\((-?[\d.]+)px, (-?[\d.]+)px\)/.exec(blkEl.style.transform);
  pending = { x0: e.clientX, y0: e.clientY, id, grab: { x: p.x - (+m[1]), y: p.y - (+m[2]) } };
  ac();
});
document.addEventListener("pointermove", e => {
  if (pending && !drag) {
    if (Math.hypot(e.clientX - pending.x0, e.clientY - pending.y0) > 6) {
      // 掴んだブロックから下をまとめて外す
      let found = null;
      for (const st of stacks) { found = findBlock(st.blocks, pending.id); if (found) break; }
      if (found) {
        const group = found.list.splice(found.index);
        stacks = stacks.filter(st => st.blocks.length);
        beginDrag(e, group, false, pending.grab);
      }
      pending = null;
    }
  }
  if (drag && !drag.committing) moveDrag(e);
});
document.addEventListener("pointerup", e => {
  pending = null;
  if (drag && !drag.committing) endDrag(e);
});
document.addEventListener("pointercancel", () => {
  if (drag && !drag.committing && drag.group) { stacks.push({ x: 60, y: 60, blocks: drag.group }); }
  pending = null; drag = null; fly.style.display = "none"; render();
});

/* ============ たな(パレット) ============ */
const PALORDER = ["hat", "move", "moveL", "moveU", "moveD", "jump", "repeat", "sound", "forever"];
const palEls = {};
function hasHat() {
  return stacks.some(st => st.blocks[0] && st.blocks[0].type === "hat")
    || (drag && drag.group && drag.group[0] && drag.group[0].type === "hat");
}
function buildPalette() {
  for (const t of PALORDER) {
    const d = DEFS[t];
    const item = document.createElement("div");
    item.className = "pal";
    palEls[t] = item;
    const mouth = isCType(t) ? G.MOUTH : 0;
    const hh = t === "hat" ? G.HATH : isCType(t) ? G.TB + mouth + G.BB : G.H;
    const pChipY = t === "hat" ? 14 : (isCType(t) ? (G.TB - G.CHIP) / 2 : (G.H - G.CHIP) / 2);
    const pOff = (G.CHIP - G.ICON) / 2;
    item.innerHTML = `<svg width="128" height="${(hh + G.TD + 8) * 0.5}" viewBox="-1 ${t === "hat" ? -6 : -2} ${d.w + 4} ${hh + G.TD + 10}">
      <path d="${t === "hat" ? pathHat(d.w) : isCType(t) ? pathC(d.w, mouth, t === "forever") : pathBody(d.w)}" fill="${d.fill}" stroke="${d.edge}" stroke-width="2.5"/>
      <rect x="${G.CHIPX}" y="${pChipY}" width="${G.CHIP}" height="${G.CHIP}" rx="11" fill="#FFFDF6" stroke="rgba(0,0,0,.10)" stroke-width="1"/>
      <image href="${ICON_IMG[t]}" x="${G.CHIPX + pOff}" y="${pChipY + pOff}" width="${G.ICON}" height="${G.ICON}"/>
      <text x="${G.LABELX}" y="${t === "hat" ? 42 : 32}" fill="#fff" font-size="21" font-weight="900" font-family="Zen Maru Gothic, sans-serif">${d.label}</text>
    </svg>`;
    item.addEventListener("pointerdown", e => {
      if (running) return;
      e.preventDefault();
      ac();
      if (t === "hat" && hasHat()) { // 1キャラにつき はた1本(本番仕様)
        item.classList.remove("no"); void item.offsetWidth; item.classList.add("no");
        tone(180, 0.12, "sine", 0.15);
        return;
      }
      const b = mk(t, ["move", "moveL", "moveU", "moveD"].includes(t) ? { n: 3 } : t === "jump" ? { n: 1 } : t === "repeat" ? { n: 2, children: [] } : t === "sound" ? { s: 0 } : isCType(t) ? { children: [] } : {});
      beginDrag(e, [b], true, { x: DEFS[t].w / 2, y: 20 });
    });
    palette.appendChild(item);
  }
}
function isCType(t) { return t === "repeat" || t === "forever"; }

/* ============ 数値ステッパー ============ */
const pop = document.getElementById("pop");
let popTarget = null;
function onPill(pill) {
  if (running) return;
  const id = +pill.dataset.pill;
  let found = null;
  for (const st of stacks) { found = findBlock(st.blocks, id); if (found) break; }
  if (!found) return;
  const b = found.list[found.index];
  const d = DEFS[b.type];
  if (d.pill === "s") { // おとは タップで切り替え＋試聴
    b.s = (b.s + 1) % SOUNDS.length;
    pill.textContent = SOUNDS[b.s];
    SND[b.s]();
    return;
  }
  popTarget = b;
  pop.querySelector(".val").textContent = b.n;
  const rect = pill.getBoundingClientRect(), sr = stage.getBoundingClientRect();
  pop.classList.add("on");
  const px = Math.max(8, Math.min(sr.width - 160, rect.left - sr.left + rect.width / 2 - 76));
  pop.style.left = px + "px";
  pop.style.top = Math.max(6, rect.top - sr.top - 76) + "px";
}
function hidePop() { pop.classList.remove("on"); popTarget = null; }
pop.addEventListener("pointerdown", e => e.stopPropagation());
pop.querySelector(".minus").addEventListener("click", () => stepVal(-1));
pop.querySelector(".plus").addEventListener("click", () => stepVal(1));
function stepVal(dir) {
  if (!popTarget) return;
  const d = DEFS[popTarget.type];
  const nv = Math.max(d.min, Math.min(d.max, popTarget.n + dir));
  if (nv !== popTarget.n) { popTarget.n = nv; sndTick(); }
  pop.querySelector(".val").textContent = popTarget.n;
  const div = els.get(popTarget.id);
  if (div) { const pl = div.querySelector(".pill"); if (pl) pl.textContent = "×" + popTarget.n; }
}

/* ============ 上演(実行エンジン) ============ */
const TICK = 400;            // 1拍(ms) - 実装移植用の正本値
const theater = document.getElementById("theater");
const actor = document.getElementById("actor");
const actorIn = document.getElementById("actorIn");
const runbtn = document.getElementById("runbtn");
const TRI = '<svg width="20" height="20" viewBox="0 0 20 20"><path d="M5 2 L18 10 L5 18 Z" fill="#fff"/></svg>';
const SQ = '<svg width="18" height="18" viewBox="0 0 18 18"><rect x="2" y="2" width="14" height="14" rx="3" fill="#fff"/></svg>';
const LCOLS = 12, LROWS = 8; // 論理ステージ(固定・全端末で同じ広さ) - 実装移植用の正本値
const START_CELL = 1;
let running = false, token = null;
let cell = START_CELL, row = 0;
let cellPx = 22;             // 表示縮尺(画面に合わせて全体をスケール)
const actorSvg = actorIn.querySelector("svg");
const waitMs = ms => new Promise(r => setTimeout(r, ms));

function updateDims() {
  const w = theater.clientWidth, h = theater.clientHeight;
  cellPx = Math.min((w - 52) / LCOLS, (h - 44) / LROWS);
  const sz = Math.round(cellPx * 2.2);
  actorSvg.setAttribute("width", sz);
  actorSvg.setAttribute("height", sz);
}
function placeActor(anim) {
  if (!anim) actor.style.transition = "none";
  actor.style.transform = `translate(${22 + cell * cellPx}px, ${-row * cellPx}px)`;
  if (!anim) requestAnimationFrame(() => { actor.style.transition = ""; });
}
function hl(id, on) { const el = els.get(id); if (el) el.classList.toggle("exec", on); }
function replay(el, cls, dur) {
  el.classList.remove("hopA", "stepA", "bumpA"); // アニメ同士の衝突(後勝ち)を防ぐ
  void el.offsetWidth;
  el.style.animationDuration = dur ? dur + "ms" : "";
  el.classList.add(cls);
}
const hop = () => { actorIn.style.setProperty("--hopH", (-cellPx * 1.6) + "px"); replay(actorIn, "hopA", TICK * 2); };
const stepAnim = () => replay(actorIn, "stepA");
const bump = () => { replay(actorIn, "bumpA"); tone(200, 0.12, "sine", 0.15); };

async function runBlock(b, tk) {
  if (tk.stop) return;
  hl(b.id, true);
  try {
    if (b.type === "hat") { await waitMs(TICK * 0.5); }
    else if (b.type === "move" || b.type === "moveL" || b.type === "moveU" || b.type === "moveD") {
      const dx = b.type === "move" ? 1 : b.type === "moveL" ? -1 : 0;
      const dy = b.type === "moveU" ? 1 : b.type === "moveD" ? -1 : 0;
      for (let i = 0; i < b.n; i++) {
        if (tk.stop) return;
        const nx = cell + dx, ny = row + dy;
        if (nx < 0 || nx >= LCOLS || ny < 0 || ny >= LROWS) { bump(); await waitMs(TICK); break; } // 端: 残り歩数は捨てる
        cell = nx; row = ny; placeActor(true); stepAnim();
        await waitMs(TICK);
      }
    }
    else if (b.type === "jump") {
      for (let i = 0; i < b.n; i++) { if (tk.stop) return; hop(); await waitMs(TICK * 2); }
    }
    else if (b.type === "sound") { SND[b.s](); await waitMs(TICK); }
    else if (b.type === "repeat") {
      for (let k = 0; k < b.n; k++) { if (tk.stop) return; await runList(b.children, tk); }
    }
    else if (b.type === "forever") {
      while (!tk.stop) {
        if (!b.children.length) { await waitMs(TICK); continue; }
        await runList(b.children, tk);
      }
    }
  } finally { hl(b.id, false); }
}
async function runList(list, tk) {
  for (const b of list) { if (tk.stop) return; await runBlock(b, tk); }
}
async function startRun() {
  const hats = stacks.filter(st => st.blocks[0] && st.blocks[0].type === "hat");
  if (!hats.length) { bump(); return; } // はたブロックがない
  hidePop();
  running = true;
  token = { stop: false };
  const tk = token;
  document.body.classList.add("running");
  runbtn.classList.add("stop");
  runbtn.innerHTML = SQ;
  updateDims();
  cell = START_CELL; row = 0;
  placeActor(false);
  tone(1050, 0.06, "square", 0.12); // カチンコ
  setTimeout(() => tone(700, 0.08, "square", 0.1), 60);
  await Promise.all(hats.map(st => runList(st.blocks, tk))); // 全スタック並行実行
  if (!tk.stop) endRun(false);
}
function endRun(reset) {
  running = false;
  document.body.classList.remove("running");
  runbtn.classList.remove("stop");
  runbtn.innerHTML = TRI;
  document.querySelectorAll(".blk.exec").forEach(el => el.classList.remove("exec"));
  if (reset) { cell = START_CELL; row = 0; placeActor(true); } // ■=カット! 初期位置へ
}
function stopRun() {
  if (token) token.stop = true;
  tone(500, 0.1, "sine", 0.14);
  endRun(true);
}
runbtn.addEventListener("click", () => { ac(); running ? stopRun() : startRun(); });
const bigbtn = document.getElementById("bigbtn");
bigbtn.addEventListener("click", () => {
  document.body.classList.toggle("big");
  hidePop();
  requestAnimationFrame(() => { updateDims(); placeActor(false); }); // 広がった寸法で格子を再計算
});

/* ============ 起動 ============ */
document.getElementById("reset").addEventListener("click", () => {
  if (running) stopRun();
  for (const [, div] of els) div.remove();
  els.clear();
  initialScene();
  render();
});
buildPalette();
initialScene();
render();
updateDims();
placeActor(false);
window.addEventListener("resize", () => { updateDims(); placeActor(false); });
</script>
</body>
</html>
