<svg xmlns="http://www.w3.org/2000/svg" width="920" height="620" viewBox="0 0 920 620" font-family="sans-serif">
  <rect width="920" height="620" fill="#FBF7EF"/>
  <text x="460" y="42" font-size="26" font-weight="bold" text-anchor="middle" fill="#3A3A3A">レイヤー合成方式：重ねるだけで組み合わせ自在</text>

  <!-- 左：レイヤーを分解した図 -->
  <text x="230" y="88" font-size="18" font-weight="bold" text-anchor="middle" fill="#555">用意するPNG（部位ごと・重なり順を固定）</text>

  <!-- レイヤーの積み重なりを斜めに見せる -->
  <g>
    <!-- z5 帽子 -->
    <rect x="120" y="120" width="220" height="60" rx="10" fill="#FFE0A3" stroke="#E0A94F" stroke-width="2"/>
    <text x="135" y="157" font-size="16" fill="#8A5A00">z5・あたま前：ぼうし 🎩</text>
    <!-- z4 リボン -->
    <rect x="120" y="200" width="220" height="60" rx="10" fill="#FFCBD6" stroke="#E08196" stroke-width="2"/>
    <text x="135" y="237" font-size="16" fill="#9A2A44">z4・くび：リボン 🎀</text>
    <!-- z3 手持ち -->
    <rect x="120" y="280" width="220" height="60" rx="10" fill="#CFE8CF" stroke="#7FB07F" stroke-width="2"/>
    <text x="135" y="317" font-size="16" fill="#2E6B2E">z3・て：むしめがね 🔍</text>
    <!-- z2 体 -->
    <rect x="120" y="360" width="220" height="60" rx="10" fill="#CFE0F5" stroke="#7FA5D0" stroke-width="2"/>
    <text x="135" y="397" font-size="16" fill="#28507F">z2・からだ：ふく 👕</text>
    <!-- z1 背中 -->
    <rect x="120" y="440" width="220" height="60" rx="10" fill="#E5D5F0" stroke="#A97FC0" stroke-width="2"/>
    <text x="135" y="477" font-size="16" fill="#5A2E7A">z1・せなか：リュック 🎒</text>
    <!-- z0 ベース -->
    <rect x="120" y="520" width="220" height="60" rx="10" fill="#EEE" stroke="#999" stroke-width="2"/>
    <text x="135" y="557" font-size="16" fill="#444">z0・ベース：人物 🧒</text>
  </g>

  <!-- 矢印 -->
  <text x="470" y="350" font-size="40" text-anchor="middle" fill="#C0A060">→</text>
  <text x="470" y="385" font-size="14" text-anchor="middle" fill="#8A7040">かさねる</text>

  <!-- 右：合成結果 -->
  <text x="700" y="88" font-size="18" font-weight="bold" text-anchor="middle" fill="#555">画面での見え方（重ねた結果）</text>
  <rect x="560" y="110" width="280" height="470" rx="16" fill="#fff" stroke="#DDD" stroke-width="2"/>

  <!-- 簡易な人物＋装備のイメージ -->
  <!-- リュック(背中・体の後ろ) -->
  <rect x="628" y="300" width="48" height="70" rx="12" fill="#B98FD0"/>
  <!-- 体 -->
  <ellipse cx="700" cy="300" rx="55" ry="70" fill="#8FB5E0"/>
  <!-- 頭 -->
  <circle cx="700" cy="210" r="55" fill="#F3D3B5"/>
  <!-- 髪 -->
  <path d="M648 195 Q700 130 752 195 Q735 175 700 178 Q665 175 648 195Z" fill="#7A5230"/>
  <!-- 帽子(頭の前) -->
  <rect x="655" y="150" width="90" height="20" rx="8" fill="#F5C24F"/>
  <rect x="672" y="120" width="56" height="35" rx="10" fill="#F5C24F"/>
  <!-- リボン(首) -->
  <path d="M685 268 l15 -12 l15 12 l-15 12 Z" fill="#E8809A"/>
  <!-- 手・虫めがね -->
  <circle cx="640" cy="330" r="14" fill="#F3D3B5"/>
  <circle cx="628" cy="352" r="16" fill="none" stroke="#4A8A4A" stroke-width="5"/>
  <line x1="637" y1="343" x2="632" y2="338" stroke="#4A8A4A" stroke-width="5"/>
  <!-- 脚 -->
  <rect x="678" y="365" width="18" height="60" rx="8" fill="#B98A5A"/>
  <rect x="704" y="365" width="18" height="60" rx="8" fill="#B98A5A"/>

  <text x="700" y="475" font-size="15" text-anchor="middle" fill="#555">ぼうし＋リボン＋むしめがね＋リュック</text>
  <text x="700" y="500" font-size="15" text-anchor="middle" fill="#555">を同時装備（合成画像は0枚）</text>
  <text x="700" y="540" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E7D32">PNG 5枚 → 組み合わせ無限</text>

  <!-- 下部の要点 -->
  <text x="230" y="612" font-size="13" text-anchor="middle" fill="#777">同じ部位（例：ぼうし）は1つだけ／違う部位はいくつでも重ねられる</text>
</svg>
